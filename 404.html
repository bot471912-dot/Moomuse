<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>404</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #acb851;
            font-family: Arial, sans-serif;
            color: white;
        }

        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
        }

        .text {
            max-width: 400px;
        }

        h1 {
            font-size: 80px;
            margin: 0;
        }

        .description {
            font-size: 18px;
            margin-top: 10px;
        }

        img {
            width: 300px;
            margin-left: 40px;
            cursor: pointer;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 5px;
            background: green;
            color: white;
            text-decoration: none;
        }

        /* POPUP */
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
        }

        .popup-content {
            background: white;
            border-radius: 10px;
            width: 80%;
            height: 80%;
            overflow: hidden;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .close {
            position: absolute;
            top: 10px;
            right: 10px;
            background: red;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 5px;
            z-index: 10;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="text">
            <h1>Moo 404</h1>
            <p class="description">The page you are looking for has been moved or deleted ... MOOO : /</p>

            <a href="/">Back to home</a>
        </div>

        <!-- GIF cliquable -->
        <img src="https://github.com/bot471912-dot/moomuz-site/blob/site/gif%20404.gif?raw=true" onclick="openPopup()" alt="404 gif">
    </div>

    <!-- POPUP AVEC SITE -->
    <div class="popup" id="popup" onclick="closePopup()">
        <div class="popup-content" onclick="event.stopPropagation()">
            
            <button class="close" onclick="closePopup()">X</button>

            <!-- 👇 CHANGE ICI TON SITE -->
            <iframe src="https://github.com/bot471912-dot/Moomuse/blob/main/skate.gif?raw=true"></iframe>


        </div>
    </div>

    <script>
        function openPopup() {
            document.getElementById("popup").style.display = "flex";
        }

        function closePopup() {
            document.getElementById("popup").style.display = "none";
        }
    </script>

</body>
</html>
